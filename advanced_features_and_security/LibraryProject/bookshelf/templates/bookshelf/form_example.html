<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Secure Form Example</title>
</head>
<body>
    <h1>Book Editing Form</h1>
    <form method="post">
        {% csrf_token %}
        <label for="title">Book Title:</label>
        <input type="text" id="title" name="title"><br><br>
        <input type="submit" value="Submit">
    </form>
</body>
</html>

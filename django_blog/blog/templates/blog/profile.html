{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2>Profile Page for {{ user.username }}</h2>
    <div class="profile-content">
        <form method="POST">
            {% csrf_token %}
            {{ form|crispy }}
            <button type="submit">Update Profile</button>
        </form>
    </div>
{% endblock content %}

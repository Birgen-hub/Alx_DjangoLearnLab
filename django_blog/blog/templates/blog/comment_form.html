{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2>Edit Comment</h2>
    <p>Editing comment on post: <strong>{{ object.post.title }}</strong></p>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit" class="btn-comment">Update Comment</button>
    </form>
    <a href="{% url 'post_detail' pk=object.post.pk %}" class="btn-cancel">Cancel</a>
{% endblock content %}

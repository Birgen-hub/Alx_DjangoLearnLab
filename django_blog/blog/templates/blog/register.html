{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2>Register</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit">Register</button>
    </form>
    <small>Already Have An Account? <a href="{% url 'login' %}">Sign In</a></small>
{% endblock content %}

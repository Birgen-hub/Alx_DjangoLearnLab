{% extends "blog/base.html" %}

{% block content %}
    <form method="POST" class="delete-form">
        {% csrf_token %}
        <h2>Confirm Comment Deletion</h2>
        <p>Are you sure you want to delete this comment on post: <strong>"{{ object.post.title }}"</strong>?</p>
        
        <div class="comment-to-delete">{{ object.content|truncatechars:100 }}</div>

        <button type="submit" class="btn-delete">Yes, Delete Comment</button>
        <a href="{% url 'post_detail' pk=object.post.pk %}" class="btn-cancel">Cancel</a>
    </form>
{% endblock content %}

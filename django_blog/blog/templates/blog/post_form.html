{% extends "blog/base.html" %}
{% load crispy_forms_tags %}

{% block content %}
    <h2>{% if form.instance.pk %}Edit Post{% else %}Create New Post{% endif %}</h2>
    <form method="POST">
        {% csrf_token %}
        {{ form|crispy }}
        <button type="submit">
            {% if form.instance.pk %}Update Post{% else %}Publish Post{% endif %}
        </button>
    </form>
{% endblock content %}
